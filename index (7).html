function addRepFromSettings(){
  const nextNumber = (app.reps || []).length + 1;
  if(!app.reps) app.reps = [];
  app.reps.push({
    id: uid(),
    name: `Rep ${nextNumber}`,
    email: '',
    active: true,
    startDate: '',
    weeks: [emptyWeek(app.products || defaultProducts)]
  });
  activeRep = app.reps.length - 1;
  settingsMutate(true);
}

function deleteRepFromSettings(index){
  if(!app.reps || !app.reps[index]) return;
  if(app.reps.length <= 1){
    alert('You need at least one rep in the app.');
    return;
  }

  const repName = app.reps[index].name || `Rep ${index + 1}`;
  if(!confirm(`Delete ${repName}? This removes their scorecard, weekly updates, product mix, and 1:1 notes.`)) return;

  snapshotForUndo(`${repName} deleted.`);
  app.reps.splice(index,1);

  if(activeRep >= app.reps.length) activeRep = app.reps.length - 1;

  settingsMutate(true);
  showUndo(`${repName} deleted. Undo available for a few seconds.`);
}


function addOneOnOneQuestion(){
  if(!app.oneOnOneQuestions) app.oneOnOneQuestions = defaultOneOnOneQuestions.map(q=>({...q}));

  const label = prompt('New 1:1 question/topic?');
  if(!label || !label.trim()) return;

  app.oneOnOneQuestions.push({
    id:'customNote_' + uid(),
    label:label.trim(),
    type:'manager'
  });

  settingsMutate(true);
}

function renameOneOnOneQuestion(index,value){
  if(!app.oneOnOneQuestions || !app.oneOnOneQuestions[index]) return;
  app.oneOnOneQuestions[index].label = value;
  settingsMutate(false);
}

function updateOneOnOneQuestionType(index,value){
  if(!app.oneOnOneQuestions || !app.oneOnOneQuestions[index]) return;
  app.oneOnOneQuestions[index].type = value;
  settingsMutate(false);
}

function deleteOneOnOneQuestion(index){
  if(!app.oneOnOneQuestions || !app.oneOnOneQuestions[index]) return;

  const q = app.oneOnOneQuestions[index];
  if(!confirm(`Delete "${q.label}" from the 1:1 question list?`)) return;

  app.oneOnOneQuestions.splice(index,1);

  if(!app.oneOnOneQuestions.length){
    app.oneOnOneQuestions = defaultOneOnOneQuestions.map(q=>({...q}));
  }

  settingsMutate(true);
}

function addProductFromSettings(){
  const name = prompt('Product name?');
  if(!name || !name.trim()) return;
  const cleanName = name.trim();
  if(app.products.includes(cleanName)){
    alert('That product already exists.');
    return;
  }
  app.products.push(cleanName);
  app.reps.forEach(rep => (rep.weeks || []).forEach(w => {
    ['productDemos','productSet','productHeld','productClosed'].forEach(bucket=>{
      if(!w[bucket]) w[bucket] = {};
      w[bucket][cleanName] = '';
    });
  }));
  settingsMutate(true);
}

function deleteProductFromSettings(index){
  if(!app.products || !app.products[index]) return;

  const product = app.products[index];
  if(!confirm(`Delete ${product}? This removes it from Product Mix data.`)) return;

  snapshotForUndo(`${product} product deleted.`);

  app.products.splice(index,1);
  app.reps.forEach(rep => (rep.weeks || []).forEach(w => {
    ['productDemos','productSet','productHeld','productClosed'].forEach(bucket=>{
      if(w[bucket]) delete w[bucket][product];
    });
  }));

  settingsMutate(true);
  showUndo(`${product} deleted. Undo available for a few seconds.`);
}

function renameProduct(index,value){
  const old = app.products[index];
  app.products[index] = value;
  app.reps.forEach(rep=>rep.weeks.forEach(w=>{
    if(w.productDemos[value] === undefined) w.productDemos[value] = w.productDemos[old] ?? '';
    delete w.productDemos[old];
  }));
  settingsMutate(false);
}

function exportData(){
  const blob = new Blob([JSON.stringify(app,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rep-scorecard-backup.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      app = JSON.parse(reader.result);
      if(!app.monthlyOverrides) app.monthlyOverrides = {};
app.reps.forEach(r=>r.weeks.forEach(ensureWeekShape));
      activeRep = 0;
      saveAndRender();
    }catch(err){
      alert('Could not import that file.');
    }
  };
  reader.readAsText(file);
}

function resetData(){
  if(!confirm('Reset all scorecard data? Export a backup first if you need it.')) return;
  localStorage.removeItem(STORAGE_KEY);
  app = initialData();
  activeRep = 0;
  saveAndRender();
}

function generateRecapMailto(repIndex, weekId){
  const rep = app.reps[repIndex];
  if(!rep) return;
  const week = rep.weeks.find(w=>w.id===weekId);
  if(!week) return;

  const to = rep.email || '';
  const subject = `1:1 Recap — ${escapeHtml(rep.name)} — Week of ${week.weekOf}`;

  const line = (label, val) => val && String(val).trim() ? `${label}:\n${String(val).trim()}\n` : '';
  const divider = '─'.repeat(48);

  const body = [
    `Hi ${rep.name},`,
    ``,
    `Here's a summary of our 1:1 for the week of ${week.weekOf}.`,
    ``,
    divider,
    `📊 WEEKLY RESULTS`,
    divider,
    `Set Demos:   ${num(week.setDemos)}`,
    `Held Demos:  ${num(week.demosHeld)}`,
    `MRR:         ${fmtMoney(week.mrr)}`,
    `Calls:       ${num(week.calls)}`,
    `Emails:      ${num(week.emails)}`,
    ``,
    divider,
    `💬 REP DISCUSSION`,
    divider,
    line(`What's going well / proud of`, week.goingWell),
    line(`Top 3 priorities this week`, week.topPriorities),
    line(`Biggest challenge / blocker`, week.biggestBlocker),
    line(`Suggestions for improvement`, week.suggestions),
    divider,
    `📋 MANAGER FEEDBACK`,
    divider,
    line(`Coaching feedback`, week.managerFeedback),
    line(`Agreed action items`, week.actionItems),
    ``,
    divider,
    `Questions? Reply to this email or reach out directly.`,
    ``,
  ].join('\n');

  const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

function showRecapModal(repIndex, weekId){
  const rep = app.reps[repIndex];
  if(!rep) return;
  if(!rep.email){
    // Prompt for email if not set
    const email = prompt(`No email on file for ${rep.name}.\nEnter their email address to send the recap:`,'');
    if(!email) return;
    app.reps[repIndex].email = email.trim();
    persist();
  }
  generateRecapMailto(repIndex, weekId);
}


function normalizeSearchText(value){
  return String(value || '').toLowerCase();
}

function searchIncludes(text, query){
  return normalizeSearchText(text).includes(normalizeSearchText(query));
}

function highlightSearch(text, query){
  const raw = String(text || '');
  if(!query) return escapeHtml(raw);

  const safe = escapeHtml(raw);
  const escapedQuery = String(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  try{
    return safe.replace(new RegExp(escapedQuery,'ig'), match=>`<span class="search-highlight">${match}</span>`);
  }catch(e){
    return safe;
  }
}

function weekSearchText(rep, week){
  const productText = app.products.map(p=>{
    return `${p} set ${(week.productSet||{})[p] || ''} held ${(week.productHeld||{})[p] || ''} closed ${(week.productClosed||{})[p] || ''}`;
  }).join(' ');

  return [
    rep.name,
    rep.email,
    week.weekOf,
    week.goingWell,
    week.topPriorities,
    week.biggestBlocker,
    week.suggestions,
    week.managerFeedback,
    week.actionItems,
    week.disciplinaryConcern,
    week.disciplinaryFeedback,
    week.disciplinaryNextSteps,
    productText
  ].join(' ');
}

function buildSearchResults(){
  const q = searchQuery.trim();
  if(!q) return [];

  const results = [];

  app.reps.forEach((rep,repIndex)=>{
    const repMatch = searchIncludes(rep.name, q) || searchIncludes(rep.email, q);

    if((searchType === 'all' || searchType === 'reps') && repMatch){
      results.push({
        type:'Rep',
        title:rep.name,
        meta:rep.email || 'No email saved',
        body:`Rep profile match.`,
        action:`activeRep=${repIndex};setTab('reps')`
      });
    }

    (rep.weeks || []).forEach(week=>{
      const text = weekSearchText(rep, week);

      if(!searchIncludes(text, q)) return;

      if(searchType === 'reps') return;

      let type = 'History';
      if(searchType === 'notes') type = '1:1 Notes';
      if(searchType === 'products') type = 'Product Mix';
      if(searchType === 'all') type = 'Match';

      const noteBody = [
        week.topPriorities ? `Priorities: ${week.topPriorities}` : '',
        week.biggestBlocker ? `Blocker: ${week.biggestBlocker}` : '',
        week.managerFeedback ? `Manager Feedback: ${week.managerFeedback}` : '',
        week.actionItems ? `Action Items: ${week.actionItems}` : '',
        app.products.map(p=>{
          const set = (week.productSet||{})[p];
          const held = (week.productHeld||{})[p];
          const closed = (week.productClosed||{})[p];
          return (set || held || closed) ? `${p}: Set ${set||0}, Held ${held||0}, Closed ${closed||0}` : '';
        }).filter(Boolean).join('\\n')
      ].filter(Boolean).join('\\n\\n') || 'Weekly record match.';

      if(searchType === 'notes' && !searchIncludes([
        week.goingWell,
        week.topPriorities,
        week.biggestBlocker,
        week.suggestions,
        week.managerFeedback,
        week.actionItems
      ].join(' '), q)) return;

      if(searchType === 'products' && !searchIncludes(app.products.map(p=>`${p} ${(week.productSet||{})[p] || ''} ${(week.productHeld||{})[p] || ''} ${(week.productClosed||{})[p] || ''}`).join(' '), q)) return;

      results.push({
        type,
        title:`${rep.name} — Week of ${week.weekOf}`,
        meta:`${rep.name} • ${week.weekOf}`,
        body:noteBody,
        action:`activeRep=${repIndex};setTab('reps')`
      });
    });
  });

  return results.slice(0,75);
}

function handleSearchInput(value){
  searchQuery = value;
  // Update results in place without full render to preserve focus
  clearTimeout(_searchDebounceTimer);
  _searchDebounceTimer = setTimeout(()=>{
    const resultsEl = document.querySelector('.search-results');
    const emptyEls = document.querySelectorAll('.search-empty-state');
    if(!resultsEl) { render(); return; }

    // Remove existing empty states
    emptyEls.forEach(el=>el.remove());

    const results = buildSearchResults();
    const searchRoot = resultsEl.closest('.card');

    // Update or inject empty state messages
    const noQuery = !searchQuery.trim();
    const noResults = searchQuery.trim() && !results.length;
    let emptyHtml = '';
    if(noQuery) emptyHtml = `<div class="search-empty-state">${emptyState('Start searching','Type a keyword, rep name, product, blocker, or coaching topic to search across saved history.')}</div>`;
    if(noResults) emptyHtml = `<div class="search-empty-state">${emptyState('No results found','Try a different keyword or broaden the search type to All.')}</div>`;

    const existingEmpty = searchRoot.querySelector('.search-empty-state');
    if(existingEmpty) existingEmpty.remove();
    if(emptyHtml) resultsEl.insertAdjacentHTML('beforebegin', emptyHtml.replace(/^<div[^>]*>|<\/div>$/, ''));

    resultsEl.innerHTML = results.map(result=>`
      <div class="search-card">
        <div class="row" style="align-items:flex-start;flex-wrap:wrap">
          <div>
            <h3>${escapeHtml(result.title)}</h3>
            <div class="search-meta">${escapeHtml(result.type)} • ${escapeHtml(result.meta)}</div>
          </div>
          <button class="btn" onclick="${result.action}">Open Rep</button>
        </div>
        <div class="search-hit">${highlightSearch(result.body, searchQuery)}</div>
      </div>
    `).join('');
  }, 180);
}

    <span class="tab-save-bar__msg">
      ${dirty
        ? '⚠️ <b>You have unsaved changes.</b>'
        : '✓ All changes saved.'}
    </span>
    <div style="display:flex;gap:8px;align-items:center">
      ${dirty ? `<button class="btn" style="padding:6px 14px;font-size:12px" onclick="discardChanges()">Discard</button>` : ''}
      <button class="btn-primary tab-save-bar__btn" style="padding:6px 18px;font-size:13px;font-weight:700" onclick="globalSave()">
        ${dirty ? '💾 Save Now' : '💾 Save'}
      </button>
    </div>
  </div>`;
}

function render(){
  const root = document.getElementById('root');
  if(!root) return;

  document.querySelectorAll('.nav button').forEach(btn=>btn.classList.remove('active'));
  const nav = document.getElementById('nav-' + activeTab);
  if(nav) nav.classList.add('active');

  const saveBar = renderSaveBar();

  if(activeTab === 'dashboard') root.innerHTML = saveBar + renderDashboard();
  else if(activeTab === 'reps') root.innerHTML = saveBar + renderReps();
  else if(activeTab === 'repinfo') root.innerHTML = saveBar + renderRepInfo();
  else if(activeTab === 'monthly') root.innerHTML = saveBar + renderMonthlyReport();
  else if(activeTab === 'products') root.innerHTML = saveBar + renderProducts();
  else if(activeTab === 'notes') root.innerHTML = saveBar + renderNotes();
  else if(activeTab === 'search') root.innerHTML = saveBar + renderSearch();
  else if(activeTab === 'settings') root.innerHTML = saveBar + renderSettings();
  else root.innerHTML = saveBar + renderDashboard();

  // Keep --nav-height in sync so sticky month headers offset correctly below the nav
  requestAnimationFrame(()=>{
    const navEl = document.querySelector('.nav');
    if(navEl) document.documentElement.style.setProperty('--nav-height', navEl.offsetHeight + 'px');
    initStickyMatrixHeaders();
  });
}

function initStickyMatrixHeaders(){
  // Remove any existing clones
  document.querySelectorAll('.month-matrix-sticky-clone').forEach(el=>el.remove());
  if(typeof window._stickyMatrixScroller === 'function'){
    window.removeEventListener('scroll', window._stickyMatrixScroller);
  }

  const wraps = document.querySelectorAll('.month-matrix-wrap');
  if(!wraps.length) return;

  const navEl = document.querySelector('.nav');
  const navH = navEl ? navEl.offsetHeight : 56;

  // For each matrix table, build a fixed clone of just the thead
  wraps.forEach(wrap=>{
    const table = wrap.querySelector('.month-matrix');
    if(!table) return;
    const thead = table.querySelector('thead');
    if(!thead) return;

    // Build clone
    const clone = document.createElement('div');
    clone.className = 'month-matrix-sticky-clone';
    const cloneTable = document.createElement('table');
    cloneTable.appendChild(thead.cloneNode(true));
    clone.appendChild(cloneTable);
    document.body.appendChild(clone);

    // Store reference
    wrap._stickyClone = clone;
    wrap._stickyTable = table;
  });

  function syncHeaders(){
    const navH2 = navEl ? navEl.offsetHeight : 56;
    wraps.forEach(wrap=>{
      const clone = wrap._stickyClone;
      const table = wrap._stickyTable;
      if(!clone || !table) return;

      const wrapRect = wrap.getBoundingClientRect();
      const tableRect = table.getBoundingClientRect();
      const theadHeight = table.querySelector('thead') ? table.querySelector('thead').offsetHeight : 40;

      // Show clone when header row has scrolled above the nav
      const shouldShow = wrapRect.top < navH2 && wrapRect.bottom > (navH2 + theadHeight + 20);

      if(shouldShow){
        // Sync column widths from real table headers
        const realThs = table.querySelectorAll('thead tr th');
        const cloneThs = clone.querySelectorAll('th');
        realThs.forEach((th,i)=>{
          if(cloneThs[i]) cloneThs[i].style.width = th.offsetWidth + 'px';
        });
        // Sync horizontal scroll offset
        clone.scrollLeft = wrap.scrollLeft;

        clone.style.display = 'block';
        clone.style.top = navH2 + 'px';
        clone.style.left = wrapRect.left + 'px';
        clone.style.width = wrapRect.width + 'px';
      } else {
        clone.style.display = 'none';
      }
    });
  }

  window._stickyMatrixScroller = syncHeaders;
  window.addEventListener('scroll', syncHeaders, {passive:true});

  // Also sync on horizontal scroll within each wrap
  wraps.forEach(wrap=>{
    wrap.addEventListener('scroll', ()=>{
      if(wrap._stickyClone) wrap._stickyClone.scrollLeft = wrap.scrollLeft;
    }, {passive:true});
  });
}
render();
takeSnapshot(); // baseline snapshot so discard works before cloud loads
loadFromCloud();

function toggleActionsMenu(){
  const menu = document.getElementById('actionsMenu');
  if(menu) menu.classList.toggle('open');
}
document.addEventListener('click', function(e){
  const menu = document.getElementById('actionsMenu');
  if(menu && !menu.contains(e.target)) menu.classList.remove('open');
});

function resetApp(){
  const typed = prompt('Type RESET to permanently remove all local app data.');
  if(typed !== 'RESET') return;

  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function discardChanges(){
  if(!confirm('Discard all unsaved changes and revert to last saved state?')) return;
  if(_lastSavedSnapshot){
    try{
      app = JSON.parse(_lastSavedSnapshot);
      ensureMetrics();
      app.reps.forEach(r=>{
        if(r.email === undefined) r.email = '';
        if(r.active === undefined) r.active = true;
        r.weeks.forEach(ensureWeekShape);
      });
    }catch(e){ console.error('Discard failed', e); }
  }
  markClean();
  render();
}

// Mark dirty whenever any input/change/textarea fires inside #root
document.addEventListener('input', function(e){
  if(document.getElementById('root')?.contains(e.target)){
    markDirty();
  }
}, true);
document.addEventListener('change', function(e){
  if(document.getElementById('root')?.contains(e.target)){
    markDirty();
  }
}, true);

// Warn on browser close/refresh with unsaved changes
window.addEventListener('beforeunload', function(e){
  if(_isDirty){
    e.preventDefault();
    e.returnValue = '';
  }
});

// Snapshot taken after cloud load via markClean() in loadFromCloud

</script>
