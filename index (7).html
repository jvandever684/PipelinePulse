<style>
:root{
  --bg:#0b1220;
  --panel:#111a2e;
  --panel2:#16213a;
  --panel3:#0f172a;
  --border:rgba(255,255,255,.10);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --blue:#60a5fa;
  --green:#34d399;
  --amber:#fbbf24;
  --red:#fb7185;
  --softBlue:rgba(96,165,250,.12);
  --softGreen:rgba(52,211,153,.12);
  --softAmber:rgba(251,191,36,.12);
  --softRed:rgba(251,113,133,.12);
}
*{box-sizing:border-box}
html{scroll-padding-top:80px}
body{
  margin:0;
  background:linear-gradient(180deg,#0b1220 0%,#0f172a 100%);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{max-width:1380px;margin:0 auto;padding:24px}
.header{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:18px;
}
h1{margin:0;font-size:26px;letter-spacing:-.02em}
h2{margin:0;font-size:18px}
h3{margin:0;font-size:15px}
p{margin:4px 0 0;color:var(--muted);font-size:14px}
button,.btn{
  border:1px solid var(--border);
  background:rgba(255,255,255,.045);
  color:var(--text);
  border-radius:13px;
  padding:10px 14px;
  cursor:pointer;
  font-size:14px;
}
button:hover,.btn:hover{background:rgba(255,255,255,.08)}
.btn-primary{background:rgba(96,165,250,.16);border-color:rgba(96,165,250,.35);color:#bfdbfe}
.btn-danger{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.25);color:#fecdd3}
.nav{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  background:rgba(255,255,255,.035);
  border:1px solid var(--border);
  border-radius:18px;
  padding:8px;
  margin-bottom:18px;
}
.nav button.active{background:rgba(96,165,250,.18);border-color:rgba(96,165,250,.35);color:#bfdbfe}
.card{
  background:rgba(255,255,255,.035);
  border:1px solid var(--border);
  border-radius:24px;
  padding:18px;
}
.grid{display:grid;gap:16px}
.grid2{grid-template-columns:repeat(2,1fr)}
.grid3{grid-template-columns:repeat(3,1fr)}
.grid4{grid-template-columns:repeat(4,1fr)}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.small{font-size:13px;color:var(--muted)}
.cloud-status{font-size:12px;color:var(--muted);padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.035)}
.tab-save-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 18px;border-radius:18px;margin-bottom:14px;border:1px solid;transition:background .25s,border-color .25s}
.tab-save-bar--dirty{background:rgba(251,191,36,.10);border-color:rgba(251,191,36,.30)}
.tab-save-bar--clean{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.18)}
.tab-save-bar__msg{font-size:13px;color:var(--text)}
.tab-save-bar--dirty .tab-save-bar__msg{color:#fde68a}
.tab-save-bar--clean .tab-save-bar__msg{color:#6ee7b7}
.label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}
input,textarea,select{
  width:100%;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(15,23,42,.86);
  color:var(--text);
  padding:11px;
  font-size:15px;
  outline:none;
}
input:focus,textarea:focus,select:focus{border-color:rgba(96,165,250,.65);box-shadow:0 0 0 3px rgba(59,130,246,.13)}
textarea{min-height:86px;resize:vertical}
.field{margin-bottom:12px}
.status{
  border:1px solid;
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  white-space:nowrap;
  font-weight:650;
}
.green{background:var(--softGreen);border-color:rgba(52,211,153,.30);color:#a7f3d0}
.yellow{background:var(--softAmber);border-color:rgba(251,191,36,.30);color:#fde68a}
.red{background:var(--softRed);border-color:rgba(251,113,133,.30);color:#fecdd3}
.blue{background:var(--softBlue);border-color:rgba(96,165,250,.35);color:#bfdbfe}
.kpi .label{font-size:13px}
.kpi .value{font-size:30px;font-weight:800;margin-top:4px}
.kpi .sub{font-size:12px;color:#64748b;margin-top:2px}
.dashboard-reps{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.rep-card{
  background:rgba(15,23,42,.62);
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
  cursor:pointer;
}
.rep-card:hover{border-color:rgba(96,165,250,.35)}
.rep-card-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
.metric-tile{background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:14px;padding:10px}
.metric-tile b{display:block;font-size:17px;margin-top:3px}
.layout-reps{display:grid;grid-template-columns:255px 1fr;gap:18px}
.rep-list button{display:block;width:100%;text-align:left;margin-bottom:6px}
.rep-list button.active{background:rgba(96,165,250,.18);border-color:rgba(96,165,250,.35);color:#bfdbfe}
.rep-header{display:grid;grid-template-columns:1fr 1.35fr;gap:16px;align-items:end}
.month-summary{
  border:1px solid rgba(96,165,250,.18);
  background:rgba(96,165,250,.075);
  border-radius:18px;
  padding:14px;
}
.month-summary b{color:#bfdbfe}
.month-summary-line{margin-top:6px;line-height:1.7}
.week-controls{
  display:flex;
  gap:10px;
  align-items:end;
  flex-wrap:wrap;
}
.week-controls .field{margin:0;min-width:180px}
.week-card{
  background:rgba(255,255,255,.035);
  border:1px solid var(--border);
  border-radius:24px;
  overflow:hidden;
  margin-bottom:12px;
}
.week-card.closed{background:rgba(255,255,255,.025)}
.week-head{
  padding:15px 16px;
  cursor:pointer;
  user-select:none;
  transition:background .12s ease;
}
.week-head:hover{background:rgba(255,255,255,.035)}
.week-title{display:flex;gap:11px;align-items:center}
.chev{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:30px;
  height:30px;
  border-radius:11px;
  background:rgba(255,255,255,.06);
  color:#bfdbfe;
  font-weight:900;
}
.week-body{
  border-top:1px solid var(--border);
  padding:16px;
  display:grid;
  grid-template-columns:1.15fr .90fr;
  gap:16px;
}
.week-card.closed .week-body{display:none}
.section{
  background:rgba(15,23,42,.58);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}
.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.view-toggle{display:none}
.help{
  font-size:12px;
  line-height:1.45;
  color:var(--muted);
  background:rgba(96,165,250,.07);
  border:1px solid rgba(96,165,250,.16);
  padding:10px;
  border-radius:14px;
  margin-bottom:12px;
}
.outlook-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.outlook-card{border:1px solid var(--border);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}
.outlook-card .big{font-size:22px;font-weight:800;margin-top:4px}
.progress-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.progress-card{border:1px solid rgba(96,165,250,.18);background:rgba(96,165,250,.075);border-radius:16px;padding:12px}
.progress-card .big{font-size:22px;font-weight:800;margin-top:4px}
.progress-bg{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}
.progress-fill{height:8px;border-radius:999px;background:rgba(96,165,250,.78)}
.bar-bg{height:9px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.bar{height:9px;border-radius:999px;background:rgba(96,165,250,.72)}
.product-line{margin-bottom:11px}
.product-line input{max-width:80px;text-align:right}
.product-percent-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.product-percent{border:1px solid var(--border);background:rgba(255,255,255,.035);border-radius:12px;padding:8px}
.product-percent .pct{font-weight:800;color:#bfdbfe;margin-top:2px}
@media(max-width:1000px){.product-percent-grid{grid-template-columns:1fr}}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px;margin-top:14px}
.month-matrix-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px;margin-top:14px;position:relative}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;font-size:13px}
th{color:var(--muted);font-size:12px;background:rgba(255,255,255,.035)}
.month-matrix{min-width:1080px}
.month-matrix th,.month-matrix td{text-align:center;border:1px solid rgba(255,255,255,.08)}
.month-matrix .row-label{text-align:left;font-weight:800;position:sticky;left:0;background:#111a2e;z-index:1}
.month-matrix thead tr th.row-label{z-index:3}
.month-matrix-sticky-clone{position:fixed;z-index:200;overflow:hidden;pointer-events:none;display:none;border-bottom:1px solid rgba(255,255,255,.10)}
.month-matrix-sticky-clone table{border-collapse:collapse;table-layout:fixed}
.month-matrix-sticky-clone th{background:#111a2e;color:#bfdbfe;font-size:12px;font-weight:900;text-align:center;padding:10px;border:1px solid rgba(255,255,255,.08);white-space:nowrap}
.month-matrix-sticky-clone th.row-label{text-align:left;font-weight:800}
.month-matrix .hit{background:rgba(52,211,153,.16);color:#bbf7d0;font-weight:800}
.month-matrix .miss{background:rgba(251,113,133,.14);color:#fecdd3;font-weight:800}
.month-matrix .neutral{background:rgba(255,255,255,.025)}
.month-matrix .current{box-shadow:inset 0 0 0 999px rgba(96,165,250,.06)}
.month-not-in-role{background:rgba(255,255,255,.01);color:var(--muted);font-size:11px;pointer-events:none;user-select:none}
.why-toggle{margin-top:6px;font-size:11px;padding:5px 8px;border-radius:999px}
.why-panel{display:none;margin-top:8px;text-align:left;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.16);border-radius:12px;padding:8px;font-size:11px;line-height:1.45;color:var(--muted)}
.why-panel.open{display:block}
.delta-up{color:#a7f3d0;font-weight:800}
.delta-down{color:#fecdd3;font-weight:800}
.delta-flat{color:var(--muted);font-weight:800}
.status-why{margin-top:8px}
.status-why button{font-size:11px;padding:5px 8px;border-radius:999px}

function num(v){const x = Number(String(v ?? '').replace(/[$,]/g,'')); return Number.isFinite(x) ? x : 0}
function fmtMoney(v){return '$' + Math.round(num(v)).toLocaleString()}

function repTenureLabel(rep){
  if(!rep || !rep.startDate) return null;
  const start = new Date(rep.startDate);
  if(isNaN(start)) return null;
  const now = new Date();
  let months = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  if(months < 0) months = 0;
  if(months < 1) return 'Less than 1 month';
  if(months < 12) return `${months} month${months===1?'':'s'}`;
  const years = Math.floor(months / 12);
  const rem = months % 12;
  return rem > 0 ? `${years}y ${rem}m` : `${years} year${years===1?'':'s'}`;
}

function repStartedAfterMonth(rep, year, monthIndex){
  // monthIndex is 0-based. Returns true if the rep had not yet started by this month.

  const start = new Date(rep.startDate);
  if(isNaN(start)) return false;
  const cellYear = Number(year);
  const cellMonth = monthIndex; // 0-based
  const startYear = start.getFullYear();
  const startMonth = start.getMonth(); // 0-based
  return (cellYear < startYear) || (cellYear === startYear && cellMonth < startMonth);
}
function weekLabel(){
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d.toISOString().slice(0,10);
}
function monthKey(dateStr){return (dateStr || weekLabel()).slice(0,7)}
function yearKey(dateStr){return (dateStr || weekLabel()).slice(0,4)}
function monthName(key){return monthNames[Number(key.slice(5,7))-1] || key}

let _isDirty = false;

}

function _refreshTabSaveBar(){

  bar.innerHTML = `
    <span class="tab-save-bar__msg">
      ${dirty ? '⚠️ <b>You have unsaved changes.</b>' : '✓ All changes saved.'}

function metricMonthlyTotal(rep, metric, year, month){

  if(override !== undefined) return num(override);

  return (rep.weeks||[])

}

function metricYtdTotal(rep, metric, year){

function metricPaceTarget(metric, year, isTeam){
  const now = new Date();
  const selectedYear = Number(year);
  const currentYear = now.getFullYear();
  const elapsedMonths = selectedYear < currentYear ? 12 : selectedYear > currentYear ? 0 : now.getMonth()+1;
  const multiplier = isTeam ? app.reps.length : 1;
  const target = num(metric.target);
  if(!target) return 0;

  if(metric.frequency === 'weekly') return target * 4 * elapsedMonths * multiplier;
  if(metric.frequency === 'annual') return (target / 12) * elapsedMonths * multiplier;
  return target * elapsedMonths * multiplier;
}

function monthlyTotals(rep, dateStr){
  const key = monthKey(dateStr);
  const weeks = rep.weeks.filter(w=>monthKey(w.weekOf) === key);
  return {
    month:key,
    setDemos:weeks.reduce((a,w)=>a+num(w.setDemos),0),
    heldDemos:weeks.reduce((a,w)=>a+num(w.demosHeld),0),
    mrr:weeks.reduce((a,w)=>a+num(w.mrr),0),
    calls:weeks.reduce((a,w)=>a+num(w.calls),0),
    emails:weeks.reduce((a,w)=>a+num(w.emails),0),
    weeks:weeks.length
  }
}

function monthsForYear(rep, year){
  const map = {};
  monthNames.forEach((_,i)=>{
    const key = year + '-' + String(i+1).padStart(2,'0');
    map[key] = {month:key,setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0,weeks:0};
  });
  rep.weeks.filter(w=>yearKey(w.weekOf) === year).forEach(w=>{
    const key = monthKey(w.weekOf);
    if(!map[key]) map[key] = {month:key,setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0,weeks:0};
    map[key].setDemos += num(w.setDemos);
    map[key].heldDemos += num(w.demosHeld);
    map[key].mrr += num(w.mrr);
    map[key].calls += num(w.calls);
    map[key].emails += num(w.emails);
    map[key].weeks += 1;
  });
  return monthNames.map((_,i)=>map[year + '-' + String(i+1).padStart(2,'0')]);
}

function scoreCoverage(value,target){
  const t = num(target);
  if(!t) return 0;
  const pct = num(value)/t;
  if(pct>=1) return 1;
  if(pct>=.8) return .8;
  if(pct>=.6) return .6;
  if(pct>=.4) return .4;
  if(pct>=.2) return .2;
  return 0;
}

function productHealth(w){
  const vals = app.products.map(p=>num((w.productSet || w.productDemos || {})[p]));
  const total = vals.reduce((a,b)=>a+b,0);
  const count = vals.filter(v=>v>0).length;
  const concentration = total ? Math.max(...vals)/total : 0;
  if(total===0) return {label:'No Mix Entered',cls:'yellow',count,total,concentration};
  if(count>=4 && concentration<=.45) return {label:'Healthy Variety',cls:'green',count,total,concentration};
  if(count>=3 && concentration<=.60) return {label:'Moderate Variety',cls:'yellow',count,total,concentration};
  return {label:'Concentration Risk',cls:'red',count,total,concentration};
}

function opportunityOutlook(rep,w){
  const mt = monthlyTotals(rep,w.weekOf);
  const gap = Math.max(0, num(app.mrrTarget)-mt.mrr);
  const pipeline = num(w.pipelineMrr);
  const coverage = gap ? pipeline/gap : 99;
  if(gap===0) return {label:'MRR Hit',cls:'green',gap,pipeline,coverage};
  if(coverage>=2) return {label:'On Track',cls:'green',gap,pipeline,coverage};
  if(coverage>=1) return {label:'Thin',cls:'yellow',gap,pipeline,coverage};
  return {label:'At Risk',cls:'red',gap,pipeline,coverage};
}

function repStatus(rep){
  const week = rep.weeks[rep.weeks.length-1];
  const mt = monthlyTotals(rep, week.weekOf);
  const opp = opportunityOutlook(rep,week);
  const hitHeld = mt.heldDemos >= num(app.demoTarget);
  const hitMrr = mt.mrr >= num(app.mrrTarget);
  if(hitHeld && hitMrr) return {label:'Performing',cls:'green'};
  if(hitHeld || hitMrr || opp.label==='On Track' || opp.label==='MRR Hit') return {label:'On Track',cls:'green'};
  const activityOk = scoreCoverage(week.calls,app.weeklyCallTarget)>=.8 || scoreCoverage(week.emails,app.weeklyEmailTarget)>=.8;
  if(activityOk || opp.label==='Thin') return {label:'On Track',cls:'green'};
  return {label:'At Risk',cls:'red'};
}

function atRiskReasons(rep, week){
  const mt = monthlyTotals(rep, week.weekOf);
  const opp = opportunityOutlook(rep, week);
  const reasons = [];
  const heldPct = mt.heldDemos / Math.max(1, num(app.demoTarget));
  const mrrPct = mt.mrr / Math.max(1, num(app.mrrTarget));
  if(heldPct < 0.5) reasons.push('Held demos at ' + mt.heldDemos + '/' + app.demoTarget + ' (' + Math.round(heldPct*100) + '%)');
  if(mrrPct < 0.5) reasons.push('MRR at ' + fmtMoney(mt.mrr) + '/' + fmtMoney(app.mrrTarget) + ' (' + Math.round(mrrPct*100) + '%)');
  if(opp.label === 'At Risk') reasons.push('Pipeline thin — ' + fmtMoney(opp.pipeline) + ' vs ' + fmtMoney(opp.gap) + ' gap');
  if(scoreCoverage(week.calls, app.weeklyCallTarget) < 0.5) reasons.push('Low call activity (' + num(week.calls) + ' calls)');
  if(scoreCoverage(week.emails, app.weeklyEmailTarget) < 0.5) reasons.push('Low email activity (' + num(week.emails) + ' emails)');
  return reasons;
}

function updateWeek(repIndex, weekId, key, value){

function updateProduct(repIndex, weekId, category, product, value){

  if(!week) return;

function updateProductMixLive(repIndex, weekId){
  const rep = app.reps[repIndex];
  if(!rep) return;
  const week = rep.weeks.find(w=>w.id === weekId);
  if(!week) return;

  ['productSet','productHeld','productClosed'].forEach(category=>{
    const source = week[category] || {};
    const vals = app.products.map(p=>num(source[p]));
    const total = vals.reduce((a,b)=>a+b,0);

    app.products.forEach(p=>{
      const pct = total ? Math.round((num(source[p]) / total) * 100) : 0;
      const pctEl = document.querySelector(`[data-week-id="${weekId}"] [data-product-pct="${category}-${cssEscapeValue(p)}"]`);
      const barEl = document.querySelector(`[data-week-id="${weekId}"] [data-product-bar="${category}-${cssEscapeValue(p)}"]`);
      if(pctEl) pctEl.textContent = pct + '%';
      if(barEl) barEl.style.width = Math.min(100,pct) + '%';
    });
  });

  const ph = productHealth(week);
  const countEl = document.querySelector(`[data-week-id="${weekId}"] [data-product-count]`);
  const concentrationEl = document.querySelector(`[data-week-id="${weekId}"] [data-product-concentration]`);
  if(countEl) countEl.textContent = ph.count;
  if(concentrationEl) concentrationEl.textContent = Math.round(ph.concentration*100) + '%';
}

function cssEscapeValue(value){
  if(window.CSS && CSS.escape) return CSS.escape(value);
  return String(value).replace(/[^a-zA-Z0-9_-]/g,'\\$&');
}


function refreshLiveCalculations(repIndex, weekId){
  const rep = app.reps[repIndex];
  if(!rep) return;
  const week = rep.weeks.find(w=>w.id === weekId);
  if(!week) return;

  const mt = monthlyTotals(rep, week.weekOf);
  const heldPct = Math.min(100, Math.round((mt.heldDemos / Math.max(1,num(app.demoTarget))) * 100));
  const mrrPct = Math.min(100, Math.round((mt.mrr / Math.max(1,num(app.mrrTarget))) * 100));
  const setPct = Math.min(100, Math.round((mt.setDemos / Math.max(1,num(app.demoTarget))) * 100));
  const callsPerSet = num(week.setDemos) ? Math.round(num(week.calls)/num(week.setDemos)) : '—';
  const opp = opportunityOutlook(rep, week);
  const status = repStatus(rep);
  const focus = recommendedFocus(rep, week);

  // Rep header monthly summary
  const headerSet = document.querySelector('[data-header-set]');
  const headerHeld = document.querySelector('[data-header-held]');
  const headerMrr = document.querySelector('[data-header-mrr]');
  if(headerSet) headerSet.textContent = mt.setDemos;
  if(headerHeld) headerHeld.textContent = mt.heldDemos;
  if(headerMrr) headerMrr.textContent = fmtMoney(mt.mrr);

  // Update all visible week cards in the same month for this rep
  rep.weeks.filter(w => monthKey(w.weekOf) === monthKey(week.weekOf)).forEach(w => {
    const card = document.querySelector(`[data-week-id="${w.id}"]`);
    if(!card) return;

    const setEl = card.querySelector('[data-mtd-set]');
    const heldEl = card.querySelector('[data-mtd-held]');
    const mrrEl = card.querySelector('[data-mtd-mrr]');
    const heldPctEl = card.querySelector('[data-mtd-held-pct]');
    const mrrPctEl = card.querySelector('[data-mtd-mrr-pct]');
    const setBar = card.querySelector('[data-mtd-set-bar]');
    const heldBar = card.querySelector('[data-mtd-held-bar]');
    const mrrBar = card.querySelector('[data-mtd-mrr-bar]');
    if(setEl) setEl.textContent = mt.setDemos;
    if(heldEl) heldEl.textContent = mt.heldDemos;
    if(mrrEl) mrrEl.textContent = fmtMoney(mt.mrr);
    if(heldPctEl) heldPctEl.textContent = heldPct + '%';
    if(mrrPctEl) mrrPctEl.textContent = mrrPct + '%';
    if(setBar) setBar.style.width = setPct + '%';
    if(heldBar) heldBar.style.width = heldPct + '%';
    if(mrrBar) mrrBar.style.width = mrrPct + '%';
  });

  // Calls per set demo
  const card = document.querySelector(`[data-week-id="${weekId}"]`);
  if(card){
    const cps = card.querySelector('[data-calls-per-set]');
    if(cps) cps.value = callsPerSet;

    const oppStatus = card.querySelector('[data-opp-status]');
    if(oppStatus){
      oppStatus.textContent = opp.label;
      oppStatus.className = 'status ' + opp.cls;
    }

    const cardStatus = card.querySelector('[data-week-status]');
    if(cardStatus){
      cardStatus.textContent = status.label;
      cardStatus.className = 'status ' + status.cls;
    }

    const focusEl = card.querySelector('[data-recommended-focus]');
    if(focusEl) focusEl.textContent = focus;
  }

  // Product mix also depends on product demo inputs.
  updateProductMixLive(repIndex, weekId);
}

function currentDashboardMonth(){
  return monthKey(weekLabel());
}

function currentDashboardYear(){

}

function monthlyReportRowForRep(rep, month=currentDashboardMonth(), year=currentDashboardYear()){
  return monthlyRepData(rep, year).find(m => m.month === month) || {
    month,
    calls:0,
    emails:0,
    setDemos:0,
    heldDemos:0,

  };
}

function previousDashboardMonth(month=currentDashboardMonth()){
  const d = new Date(month + '-01T00:00:00');
  d.setMonth(d.getMonth() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function monthlyReportStats(rep, month=currentDashboardMonth()){
  const year = month.slice(0,4);
  const row = monthlyReportRowForRep(rep, month, year);
  return {
    calls:num(row.calls),
    emails:num(row.emails),
    setDemos:num(row.setDemos),
    heldDemos:num(row.heldDemos),
    mrr:num(row.mrr)
  };
}

function monthlyReportGoal(metric){
  if(metric === 'calls') return num(app.weeklyCallTarget) * 4;
  if(metric === 'emails') return num(app.weeklyEmailTarget) * 4;
  if(metric === 'setDemos') return num(app.demoTarget);
  if(metric === 'heldDemos') return num(app.demoTarget);
  if(metric === 'mrr') return num(app.mrrTarget);
  return 0;
}

function dashboardMonthPacing(){
  const now = new Date();
  const day = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const elapsedPct = Math.min(1, Math.max(0, day / daysInMonth));
  const phase = elapsedPct >= .67 ? 'late' : elapsedPct >= .34 ? 'mid' : 'early';
  return {day, daysInMonth, elapsedPct, phase};
}

function monthlyPaceStatus(actual, goal){
  const pacing = dashboardMonthPacing();
  if(!goal) return 'neutral';
  const expected = goal * pacing.elapsedPct;
  const ratio = expected ? num(actual) / expected : 1;

  if(pacing.phase === 'early'){
    if(ratio >= .65) return 'green';
    if(ratio >= .40) return 'yellow';
    return 'red';
  }

  if(pacing.phase === 'mid'){
    if(ratio >= .85) return 'green';
    if(ratio >= .65) return 'yellow';
    return 'red';
  }

  if(ratio >= .95) return 'green';
  if(ratio >= .80) return 'yellow';
  return 'red';
}

function monthlyReportRiskReason(stats){
  const reasons = [];

  if(monthlyPaceStatus(stats.calls, monthlyReportGoal('calls')) === 'red') reasons.push('activity risk');
  if(stats.calls > 0 && stats.setDemos / stats.calls < .04) reasons.push('conversion risk');
  if(stats.setDemos > 0 && stats.heldDemos / Math.max(1, stats.setDemos) < .50) reasons.push('demo flow risk');
  if(stats.setDemos > 0 && stats.mrr < stats.setDemos * 300) reasons.push('qualification risk');

  return reasons;
}

function monthlyReportTrend(rep){
  const current = monthlyReportStats(rep);
  const previous = monthlyReportStats(rep, previousDashboardMonth());
  const currentScore = current.setDemos + current.heldDemos + (current.mrr / 1000);
  const previousScore = previous.setDemos + previous.heldDemos + (previous.mrr / 1000);

  if(previousScore === 0 && currentScore > 0) return 'Improving';
  if(currentScore > previousScore * 1.10) return 'Improving';
  if(previousScore > 0 && currentScore < previousScore * .90) return 'Declining';
  return 'Stable';
}

function buildMonthlyReportInsights(rep){
  const stats = monthlyReportStats(rep);
  const previous = monthlyReportStats(rep, previousDashboardMonth());
  const trend = monthlyReportTrend(rep);
  const callToDemo = stats.calls > 0 ? stats.setDemos / stats.calls : 0;
  const demoFlow = stats.setDemos > 0 ? stats.heldDemos / stats.setDemos : 0;

  let strength = 'Stable current-month performance';
  if(stats.mrr > previous.mrr * 1.15 && stats.mrr > 0) strength = 'Strong MRR growth this month';
  else if(demoFlow >= .75 && stats.setDemos >= 6) strength = 'Strong demo flow this month';
  else if(callToDemo >= .10 && stats.calls > 0) strength = 'Strong call-to-demo conversion this month';
  else if(stats.calls > previous.calls * 1.10 && stats.calls > 0) strength = 'Activity volume is improving this month';

  const risks = monthlyReportRiskReason(stats);
  let risk = 'No major risk detected';
  if(risks.includes('activity risk')) risk = 'Current-month activity is behind pace';
  else if(risks.includes('conversion risk')) risk = 'Low conversion from calls to demos this month';
  else if(risks.includes('demo flow risk')) risk = 'Current-month demo flow needs attention';
  else if(risks.includes('qualification risk')) risk = 'Current-month qualification quality may be weak';
  else if(trend === 'Declining') risk = 'Current-month momentum is declining';

  let focus = 'Maintain consistency';
  let action = 'Review the MTD numbers and reinforce what is working.';

  if(risk.includes('activity')){
    focus = 'Activity discipline';
    action = 'Review call/email volume from the MTD and coach calendar discipline.';
  } else if(risk.includes('conversion')){
    focus = 'Opening and discovery';
    action = 'Coach first 60 seconds, relevant discovery, and stronger meeting conversion.';
  } else if(risk.includes('demo flow')){
    focus = 'Demo flow management';
    action = 'Coach confirmation habits, stakeholder alignment, and handoff quality.';
  } else if(risk.includes('qualification')){
    focus = 'Qualification quality';
    action = 'Review whether demos are tied to the right pain, persona, and product fit.';
  } else if(trend === 'Declining'){
    focus = 'Momentum recovery';
    action = 'Compare this month to last month and identify which KPI dropped first.';
  }

  const ruleAdvice = adviceForRep(rep);
  if(ruleAdvice && ruleAdvice.rule){
    focus = ruleAdvice.label;
    action = ruleAdvice.advice;
  }
  return {strength,risk,focus,action,trend,stats};
}

function hasAnyMonthlyReportData(){
  return app.reps.some(rep=>{
    const s = monthlyReportStats(rep);
    return s.calls || s.emails || s.setDemos || s.heldDemos || s.mrr;
  });
}

function classifyRepRisk(rep){
  const insights = buildMonthlyReportInsights(rep);
  const stats = insights.stats || monthlyReportStats(rep);

  const risks = [];
  let score = 0;

  if(insights.trend === 'Declining'){
    risks.push('declining monthly momentum');
    score += 25;
  }

  const monthlyRisks = monthlyReportRiskReason(stats);

  if(monthlyRisks.includes('activity risk')){
    risks.push('activity risk');
    score += 30;
  }

  if(monthlyRisks.includes('conversion risk')){
    risks.push('conversion risk');
    score += 25;
  }

  if(monthlyRisks.includes('qualification risk')){
    risks.push('qualification risk');
    score += 25;
  }

  if(monthlyRisks.includes('demo flow risk')){
    risks.push('demo flow risk');
    score += 15;
  }

  if(!stats.calls && !stats.emails && !stats.setDemos && !stats.heldDemos && !stats.mrr){
    risks.push('no current-month MTD data');
    score += 20;
  }

  return {
    rep,
    insights,
    risks,
    score,
    recentStats:{
      calls:stats.calls,
      emails:stats.emails,
      setDemos:stats.setDemos,
      held:stats.heldDemos,
      mrr:stats.mrr
    }
  };
}

function buildTeamIntelligence(){
  const reps = teamActiveReps();
  const classified = reps.map(classifyRepRisk);

  const activityRisks = classified.filter(x=>x.risks.some(r=>r.includes('activity'))).length;
  const conversionRisks = classified.filter(x=>x.risks.some(r=>r.includes('conversion'))).length;
  const qualificationRisks = classified.filter(x=>x.risks.some(r=>r.includes('qualification'))).length;
  const demoFlowRisks = classified.filter(x=>x.risks.some(r=>r.includes('demo flow'))).length;
  const declining = classified.filter(x=>x.insights.trend === 'Declining').length;
  const improving = classified.filter(x=>x.insights.trend === 'Improving').length;

  let teamMomentum = 'Stable';
  if(improving > declining) teamMomentum = 'Improving';
  if(declining > improving) teamMomentum = 'Declining';

  const productTotals = {};
  app.products.forEach(p=>productTotals[p]=0);

  reps.forEach(rep=>{
    teamRecentWeeks(rep,4).forEach(w=>{
      app.products.forEach(p=>{
        productTotals[p] += num((w.productSet || {})[p]);
      });
    });
  });

  const productEntries = Object.entries(productTotals).sort((a,b)=>b[1]-a[1]);
  const topProduct = productEntries[0];
  const lowestProduct = [...productEntries].sort((a,b)=>a[1]-b[1])[0];
  const productTotal = productEntries.reduce((s,x)=>s+x[1],0);
  const concentrationPct = topProduct && productTotal ? Math.round((topProduct[1]/productTotal)*100) : 0;

  const alerts = [];

  if(activityRisks){
    alerts.push({
      color:'red',
      label:'Activity Risk',
      value:`${activityRisks} rep${activityRisks===1?'':'s'} need activity attention`,
      detail:'Current-month activity from the MTD is behind pace or not creating enough opportunity.'
    });
  }

  if(conversionRisks){
    alerts.push({
      color:'yellow',
      label:'Conversion Risk',
      value:`${conversionRisks} rep${conversionRisks===1?'':'s'} need conversion coaching`,
      detail:'Activity is happening, but demos are not being created at the expected rate.'
    });
  }

  if(qualificationRisks){
    alerts.push({
      color:'yellow',
      label:'Qualification Risk',
      value:`${qualificationRisks} rep${qualificationRisks===1?'':'s'} may need qualification coaching`,
      detail:'Demo activity exists, but MRR output is weak relative to demo volume.'
    });
  }

  if(demoFlowRisks){
    alerts.push({
      color:'yellow',
      label:'Demo Flow Risk',
      value:`${demoFlowRisks} rep${demoFlowRisks===1?'':'s'} need demo flow review`,
      detail:'Current-month held demos are trailing demos set in the MTD.'
    });
  }

  alerts.push({
    color: teamMomentum === 'Improving' ? 'green' : teamMomentum === 'Declining' ? 'red' : 'blue',
    label:'Team Momentum',
    value:teamMomentum,
    detail:`${improving} improving • ${declining} declining • ${reps.length} active reps`
  });

  if(topProduct && topProduct[1] > 0){
    alerts.push({
      color: concentrationPct >= 65 ? 'yellow' : 'blue',
      label: concentrationPct >= 65 ? 'Product Concentration' : 'Top Product Motion',
      value:`${topProduct[0]} = ${concentrationPct}% of recent demos`,
      detail: concentrationPct >= 65 ? 'Team activity may be too concentrated in one product.' : `${topProduct[1]} demos set in the recent 4-week window.`
    });
  }

  if(lowestProduct && lowestProduct[1] === 0){
    alerts.push({
      color:'yellow',
      label:'Product Gap',
      value:`${lowestProduct[0]} has no recent activity`,
      detail:'Consider whether this product needs focus, enablement, or a campaign push.'
    });
  }

  const priorities = classified
    .filter(x=>x.score > 0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,5);

  let training = 'No team-wide training recommendation yet.';
  if(activityRisks >= 3) training = 'Recommended team training: Activity discipline and daily workflow.';
  else if(conversionRisks >= 3) training = 'Recommended team training: Opening, discovery, and value positioning.';
  else if(qualificationRisks >= 2) training = 'Recommended team training: Qualification and product fit.';
  else if(demoFlowRisks >= 2) training = 'Recommended team training: Demo confirmation and stakeholder alignment.';
  else if(concentrationPct >= 65) training = `Recommended team training: Broader product positioning beyond ${topProduct[0]}.`;

  return {alerts, priorities, training};
}

function renderTeamIntelligence(){
  if(!teamActiveReps().length) return emptyState('No active reps','Mark at least one rep active in Settings to populate Team Intelligence.','Go to Settings',`setTab('settings')`);
  const teamIntel = buildTeamIntelligence();

function dashboardMonthKeys(count=6){

    months.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
  }
  return months;
}

function trendDirectionFromValues(values, inverse=false){
  const recent = values.slice(-3).reduce((s,v)=>s+v,0);
  const prior = values.slice(0,3).reduce((s,v)=>s+v,0);

  if(prior === 0 && recent > 0) return inverse ? 'Needs Watch' : 'Improving';
  if(recent > prior * 1.10) return inverse ? 'Needs Watch' : 'Improving';
  if(recent < prior * .90) return inverse ? 'Improving' : 'Declining';
  return 'Stable';
}

function renderTrendSpark(values, inverse=false, formatter=null, labels=[]){
  const max = Math.max(1,...values);
  const min = Math.min(0,...values);
  const range = Math.max(1, max - min);
  const direction = trendDirectionFromValues(values,inverse);
  const lineColor = direction === 'Improving' ? '#34d399' : direction === 'Declining' || direction === 'Needs Watch' ? '#fb7185' : '#fbbf24';
  const fmt = formatter || (v=>v.toLocaleString());
  const width = 300;
  const height = 76;
  const padX = 18;
  const padY = 14;
  const points = values.map((v,i)=>{
    const x = values.length === 1 ? width/2 : padX + (i * ((width - padX*2) / (values.length - 1)));
    const y = padY + ((max - v) / range) * (height - padY*2);
    return {x,y,v,label:labels[i] || ''};
  });
  const poly = points.map(p=>`${p.x},${p.y}`).join(' ');
  const latest = values[values.length-1] || 0;

  return `<div class="trend-chart">
    <svg class="trend-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
      <line x1="${padX}" y1="${height-padY}" x2="${width-padX}" y2="${height-padY}" stroke="rgba(148,163,184,.25)" stroke-width="1"/>
      <polyline points="${poly}" fill="none" stroke="${lineColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      ${points.map((p,i)=>`
        <circle cx="${p.x}" cy="${p.y}" r="${i===points.length-1?4:3}" fill="${lineColor}"></circle>
      `).join('')}
    </svg>

    <div class="trend-mini-table">
      ${points.map(p=>`
        <div class="trend-mini-cell">
          <b>${escapeHtml(fmt(p.v))}</b>
          <span>${escapeHtml(p.label)}</span>
        </div>
      `).join('')}
    </div>

    <div class="trend-latest-callout">
      <div>
        <div class="latest-label">Latest month</div>
        <div class="latest-value">${escapeHtml(fmt(latest))}</div>
      </div>
      <div class="trend-direction">${escapeHtml(direction)}</div>
    </div>
  </div>`;
}

function dashboardTrendWhyText(type, values){
  const recent = values.slice(-3).reduce((s,v)=>s+v,0);
  const prior = values.slice(0,3).reduce((s,v)=>s+v,0);

  if(type === 'mrr'){
    if(recent > prior * 1.10){
      return 'Team MRR is improving versus the prior three-month period. This usually means stronger qualification, better demo quality, or improved product mix.';
    }
    if(recent < prior * .90){
      return 'Team MRR is declining versus the prior three-month period. Review qualification quality, held demo volume, and product mix concentration.';
    }
    return 'Team MRR is relatively stable compared to the previous three-month period.';
  }

  if(type === 'set'){
    if(recent > prior * 1.10){
      return 'Set demos are increasing. Prospecting activity and opening effectiveness are likely improving.';
    }
    if(recent < prior * .90){
      return 'Set demos are trending down. This may indicate weaker activity discipline, lower connect quality, or messaging fatigue.';
    }
    return 'Set demo volume is relatively stable.';
  }

  if(type === 'held'){
    if(recent > prior * 1.10){
      return 'Held demos are improving. Confirmation process and stakeholder alignment may be getting stronger.';
    }
    if(recent < prior * .90){
      return 'Held demos are declining. Review demo confirmation habits and meeting quality.';
    }
    return 'Held demo volume is relatively stable.';
  }

  if(type === 'risk'){
    if(recent > prior * 1.10){
      return 'Coaching risk count is increasing. More reps are triggering activity, conversion, or qualification concerns.';
    }
    if(recent < prior * .90){
      return 'Coaching risk count is improving. Fewer reps are triggering operational coaching alerts.';
    }
    return 'Coaching risk levels are relatively stable.';
  }

  return 'No additional insight available.';
}


function dashboardMetricValue(rep, week, metric){
  const key = metric.id || metric.source || metric.name || '';
  const stats = typeof monthlyReportStats === 'function' ? monthlyReportStats(rep, monthKey(week.weekOf || weekLabel())) : null;
  const normalized = String(key).toLowerCase().replace(/[^a-z0-9]/g,'');

  if(stats){
    if(normalized.includes('call')) return num(stats.calls);
    if(normalized.includes('email')) return num(stats.emails);
    if(normalized.includes('setdemo') || normalized === 'demos') return num(stats.setDemos);
    if(normalized.includes('helddemo') || normalized.includes('demosheld') || normalized.includes('show')) return num(stats.heldDemos);
    if(normalized.includes('mrr')) return num(stats.mrr);
  }

  return getMetricWeekValue(metric, week);
}

function projectedMonthValue(actual){
  const pacing = dashboardMonthPacing();
  return pacing.elapsedPct ? Math.round(num(actual) / pacing.elapsedPct) : num(actual);
}

function leadershipPaceLabel(actual, target){
  if(!target) return {label:'No Target', color:'blue'};
  const projected = projectedMonthValue(actual);
  const ratio = projected / Math.max(1,num(target));
  if(ratio >= 1) return {label:'On Pace', color:'green'};
  if(ratio >= .85) return {label:'Watch', color:'yellow'};
  return {label:'At Risk', color:'red'};
}

function teamProductConcentration(){
  const totals = {};
  app.products.forEach(p=>totals[p]=0);

  teamActiveReps().forEach(rep=>{
    (rep.weeks || []).filter(w=>monthKey(w.weekOf)===currentDashboardMonth()).forEach(w=>{
      app.products.forEach(p=>{
        totals[p] += num((w.productSet || {})[p]) + num((w.productHeld || {})[p]) + num((w.productClosed || {})[p]);
      });
    });
  });

  const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((sum,row)=>sum+row[1],0);
  const top = entries[0] || ['No product',0];
  const pct = total ? Math.round((top[1]/total)*100) : 0;

  return {topProduct:top[0], topValue:top[1], total, pct};
}

function dashboardMetricMonthlyTarget(metric){
  if(metric.teamGoal !== undefined && String(metric.teamGoal).trim() !== ''){
    return num(metric.teamGoal);
  }

  const activeCount = Math.max(1, teamActiveReps().length);
  const target = num(metric.target);
  if(!target) return 0;

  if(metric.frequency === 'weekly') return target * 4 * activeCount;
  if(metric.frequency === 'annual') return (target / 12) * activeCount;
  return target * activeCount;
}

function dashboardMetricTargetText(metric){
  const target = dashboardMetricMonthlyTarget(metric);
  if(!target) return 'No target set';
  return `MTD team target ${metric.type==='currency' ? fmtMoney(target) : target.toLocaleString()}`;
}

function ppKpiDeltaClass(delta){

function ppKpiDeltaText(delta, isCurrency=false){

  return sign + Math.round(delta).toLocaleString();
}

function repYtdMetric(rep, field){
  const y = yearKey(weekLabel());
  return (rep.weeks||[])
    .filter(w=>yearKey(w.weekOf)===y)
    .reduce((sum,w)=>sum+num(w[field]),0);
}

function latestWeek(rep){
  return (rep.weeks||[]).slice().sort((a,b)=>String(b.weekOf).localeCompare(String(a.weekOf)))[0] || emptyWeek();
}

function priorWeek(rep){
  return (rep.weeks||[]).slice().sort((a,b)=>String(b.weekOf).localeCompare(String(a.weekOf)))[1] || null;
}

function productTotalsForRep(rep, category='productSet'){
  const totals = {};
  app.products.forEach(p=>totals[p]=0);
  (rep.weeks||[]).forEach(w=>{
    app.products.forEach(p=>totals[p]+=num((w[category]||{})[p]));
  });
  return totals;
}

function strongestProduct(rep){
  const totals = productTotalsForRep(rep,'productSet');
  const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  return entries[0] && entries[0][1] > 0 ? entries[0][0] : 'Not enough data';
}

function productTrendText(rep){
  const weeks = (rep.weeks||[]).slice().sort((a,b)=>String(a.weekOf).localeCompare(String(b.weekOf)));
  const recent = weeks.slice(-4);
  if(recent.length < 2) return {up:'Not enough data', down:'Not enough data'};
  const firstHalf = recent.slice(0,Math.floor(recent.length/2));
  const secondHalf = recent.slice(Math.floor(recent.length/2));
  const changes = app.products.map(p=>{
    const before = firstHalf.reduce((s,w)=>s+num((w.productSet||{})[p]),0);
    const after = secondHalf.reduce((s,w)=>s+num((w.productSet||{})[p]),0);
    return {p,diff:after-before};
  });
  const up = changes.filter(x=>x.diff>0).sort((a,b)=>b.diff-a.diff).map(x=>x.p).slice(0,2).join(', ') || 'None yet';
  const down = changes.filter(x=>x.diff<0).sort((a,b)=>a.diff-b.diff).map(x=>x.p).slice(0,2).join(', ') || 'None';
  return {up,down};
}

function liveRepSummary(rep){
  const held = repYtdMetric(rep,'demosHeld');
  const set = repYtdMetric(rep,'setDemos');
  const mrr = repYtdMetric(rep,'mrr');
  const calls = repYtdMetric(rep,'calls');
  const emails = repYtdMetric(rep,'emails');
  const weeks = Math.max(1,(rep.weeks||[]).filter(w=>yearKey(w.weekOf)===yearKey(weekLabel())).length);
  const heldTarget = Math.round((num(app.demoTarget)/4)*weeks);
  const mrrTarget = Math.round((num(app.mrrTarget)/4)*weeks);
  const callTarget = num(app.weeklyCallTarget)*weeks;
  const emailTarget = num(app.weeklyEmailTarget)*weeks;
  const status = repStatus(rep);
  const trend = productTrendText(rep);
  const lw = latestWeek(rep);
  const summary = [];

  if(mrr >= mrrTarget && held >= heldTarget) summary.push(`${rep.name} is pacing ahead on both revenue and held demos.`);
  else if(mrr >= mrrTarget) summary.push(`${rep.name} is pacing ahead on revenue, but held demo volume needs attention.`);
  else if(held >= heldTarget) summary.push(`${rep.name} is creating enough held-demo activity, but MRR conversion is lagging.`);
  else summary.push(`${rep.name} is currently behind pace and needs focused activity plus stronger conversion.`);

  if(calls < callTarget) summary.push(`Call activity is behind expected pace by ${Math.abs(calls-callTarget).toLocaleString()} calls.`);
  if(emails >= emailTarget) summary.push(`Email activity is supporting the activity base.`);
  if(strongestProduct(rep) !== 'Not enough data') summary.push(`Strongest product motion is ${strongestProduct(rep)}.`);

  return {held,set,mrr,calls,emails,heldTarget,mrrTarget,callTarget,emailTarget,status,trend,lw,summary};
}


function recentWeeksForInsights(rep, count = 8){
  return [...(rep.weeks || [])]
    .sort((a,b)=>new Date(b.weekOf) - new Date(a.weekOf))
    .slice(0, count);
}

function insightMetricTotal(weeks, field){
  return weeks.reduce((sum,w)=>sum + num(w[field]), 0);
}

function determineInsightTrend(current, previous){
  if(previous === 0 && current > 0) return 'Improving';
  if(current > previous * 1.05) return 'Improving';
  if(current < previous * 0.95) return 'Declining';
  return 'Stable';
}

function buildCoachingInsights(rep){
  const weeks = recentWeeksForInsights(rep, 8);
  const current = weeks.slice(0,4);
  const previous = weeks.slice(4,8);

  const callsCurrent = insightMetricTotal(current, 'calls');
  const callsPrevious = insightMetricTotal(previous, 'calls');

  const demosCurrent = insightMetricTotal(current, 'setDemos');
  const demosPrevious = insightMetricTotal(previous, 'setDemos');

  const heldCurrent = insightMetricTotal(current, 'demosHeld');
  const heldPrevious = insightMetricTotal(previous, 'demosHeld');

  const mrrCurrent = insightMetricTotal(current, 'mrr');
  const mrrPrevious = insightMetricTotal(previous, 'mrr');

  const trend = determineInsightTrend(mrrCurrent + heldCurrent, mrrPrevious + heldPrevious);

  const callToDemo = callsCurrent > 0 ? demosCurrent / callsCurrent : 0;
  const rollingDemoFlow = demosCurrent > 0 ? heldCurrent / demosCurrent : 0;

  let strength = 'Consistent weekly performance';
  let risk = 'No major risk detected';

  if(mrrCurrent > mrrPrevious * 1.15 && mrrCurrent > 0){
    strength = 'Strong MRR growth trend';
  } else if(rollingDemoFlow >= 0.75 && demosCurrent >= 6){
    strength = 'Strong long-term demo flow consistency';
  } else if(callToDemo >= 0.10 && callsCurrent > 0){
    strength = 'Strong conversion from activity to demos';
  } else if(callsCurrent > callsPrevious * 1.10 && callsCurrent > 0){
    strength = 'Activity volume is improving';
  }

  if(callsCurrent < callsPrevious * 0.75 && callsPrevious > 0){
    risk = 'Activity trend is declining';
  } else if(callsCurrent > 0 && callToDemo < 0.04){
    risk = 'Low conversion from activity';
  } else if(demosCurrent >= 8 && rollingDemoFlow < 0.50){
    risk = 'Long-term demo flow needs attention';
  } else if(demosCurrent > 0 && mrrCurrent < demosCurrent * 300){
    risk = 'Qualification quality may be weak';
  } else if(trend === 'Declining'){
    risk = 'Performance momentum is declining';
  }

  let focus = 'Maintain consistency';
  let action = 'Review recent weekly performance and reinforce what is working.';

  if(risk.includes('Activity')){
    focus = 'Activity discipline';
    action = 'Review daily call blocks, calendar discipline, and activity consistency.';
  } else if(risk.includes('Low conversion')){
    focus = 'Opening and discovery';
    action = 'Review recent calls and coach the first 60 seconds plus discovery questions.';
  } else if(risk.includes('show rate')){
    focus = 'Demo flow management';
    action = 'Review demo scheduling, follow-up consistency, stakeholder alignment, and confirmation habits across recent weeks.';
  } else if(risk.includes('Qualification')){
    focus = 'Qualification and product fit';
    action = 'Review qualification questions before demos are set.';
  } else if(risk.includes('momentum')){
    focus = 'Pipeline recovery';
    action = 'Identify what changed in the last 4 weeks and rebuild weekly activity rhythm.';
  } else if(strength.includes('MRR')){
    focus = 'Scale revenue habits';
    action = 'Identify what drove recent MRR growth and turn it into a repeatable behavior.';
  } else if(strength.includes('conversion')){
    focus = 'Replicate conversion success';
    action = 'Capture call patterns that are creating demos and share best practices.';
  }

  return {
    trend,
    strength,
    risk,
    focus,
    action,
    stats:{
      callsCurrent,
      demosCurrent,
      heldCurrent,
      mrrCurrent
    }
  };
}


function explainStrength(insights){
  if(insights.strength.includes('MRR growth')){
    return `MRR over the last 4 weeks increased compared to the previous 4-week period. Current MRR: ${fmtMoney(insights.stats.mrrCurrent)}.`;
  }

  if(insights.strength.includes('show-through')){
    return `Held demos have remained strong relative to demos set across the recent rolling 4-week window.`;
  }

  if(insights.strength.includes('conversion')){
    return `Call-to-demo conversion exceeded the expected benchmark based on recent weekly activity.`;
  }

  if(insights.strength.includes('Activity volume')){
    return `Recent activity volume improved compared to previous weeks.`;
  }

  return `Performance has remained relatively stable and consistent across recent weeks.`;
}

function explainRisk(insights){
  if(insights.risk.includes('Activity trend')){
    return `Recent call activity declined significantly compared to the previous 4-week period.`;
  }

  if(insights.risk.includes('Low conversion')){
    return `Activity levels are present, but demos generated from activity are below target expectations.`;
  }

  if(insights.risk.includes('show rate')){
    return `Held demos are consistently trailing behind demos set across the recent rolling 4-week period.`;
  }

  if(insights.risk.includes('Qualification')){
    return `MRR production is low relative to demos generated, suggesting qualification opportunities.`;
  }

  if(insights.risk.includes('momentum')){
    return `Recent performance trend is lower than the prior 4-week trend window.`;
  }

  return `No major coaching risks were detected from recent performance data.`;
}

function explainTrend(insights){
  if(insights.trend === 'Improving'){
    return `Recent 4-week production trends are improving compared to the previous 4-week window.`;
  }

  if(insights.trend === 'Declining'){
    return `Recent 4-week production trends declined compared to the previous 4-week window.`;
  }

  return `Recent trends are relatively stable with no major directional changes.`;
}


function explainFocus(insights){
  if(insights.focus.includes('Activity')){
    return 'The app selected this because activity volume or consistency is the main risk signal.';
  }
  if(insights.focus.includes('Opening')){
    return 'The app selected this because activity is happening, but it is not converting into enough demos.';
  }
  if(insights.focus.includes('confirmation')){
    return 'The app selected this because long-term demo flow appears weaker than expected across recent weeks.';
  }
  if(insights.focus.includes('Qualification')){
    return 'The app selected this because demo activity exists, but MRR output is weak relative to demo volume.';
  }
  if(insights.focus.includes('Pipeline')){
    return 'The app selected this because recent performance momentum is trending down.';
  }
  return 'The app selected this because no major risk was detected, so the priority is maintaining consistency.';
}

function explainAction(insights){
  return 'This action is tied directly to the coaching focus and is meant to give the manager a practical next step for the next 1:1.';
}

function combinedMonthlyData(rep, monthKeyValue){
  const live = monthsForYear(rep, monthKeyValue.slice(0,4)).find(m => m.month === monthKeyValue) || {setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0};

function saveHistoricalEntry(){
  const repSelect = document.getElementById('histRep');
  const monthInput = document.getElementById('histMonth');
  const histSet = document.getElementById('histSet');
  const histHeld = document.getElementById('histHeld');
  const histMrr = document.getElementById('histMrr');
  const histCalls = document.getElementById('histCalls');
  const histEmails = document.getElementById('histEmails');
  if(!repSelect || !monthInput) return;
  const repIndex = Number(repSelect.value);
  const rep = app.reps[repIndex];
  const month = monthInput.value;
  if(!month){ alert('Please select a month.'); return; }
  if(!rep){ alert('Please select a rep.'); return; }

  const entry = {
    id: uid(),
    repName: rep.name,
    month,
    setDemos: num(histSet?.value),
    heldDemos: num(histHeld?.value),
    mrr: num(histMrr?.value),
    calls: num(histCalls?.value),
    emails: num(histEmails?.value)
  };

  const existing = app.historicalData.findIndex(h => h.repName === rep.name && h.month === month);
  if(existing >= 0){
    app.historicalData[existing] = {...app.historicalData[existing], ...entry};
  } else {
    app.historicalData.push(entry);
  }

  saveAndRender();
}

function deleteHistoricalEntry(id){
  if(!confirm('Delete this historical entry?')) return;
  app.historicalData = app.historicalData.filter(h => h.id !== id);
  saveAndRender();
}

function productMixHistory(rep){
  const monthMap = {};
  rep.weeks.forEach(w => {
    const mk = monthKey(w.weekOf);
    if(!monthMap[mk]){
      monthMap[mk] = { total:0, products:{} };
      app.products.forEach(p => monthMap[mk].products[p] = 0);
    }
    app.products.forEach(p => {
      const val = num(w.productDemos[p]);
      monthMap[mk].products[p] += val;
      monthMap[mk].total += val;
    });
  });
  return monthMap;
}

function heatColor(pct){
  if(pct >= 50) return 'background:rgba(52,211,153,.30)';
  if(pct >= 30) return 'background:rgba(96,165,250,.22)';
  if(pct >= 15) return 'background:rgba(251,191,36,.20)';
  if(pct > 0) return 'background:rgba(255,255,255,.06)';
  return '';
}

function monthlyOverrideKey(repId, month, metric){
  return `${repId}|${month}|${metric}`;
}
function getMonthlyOverride(repId, month, metric){
  return app.monthlyOverrides?.[monthlyOverrideKey(repId, month, metric)];
}
function setMonthlyOverride(repId, month, metric, value){
  if(!app.monthlyOverrides) app.monthlyOverrides = {};
  app.monthlyOverrides[monthlyOverrideKey(repId, month, metric)] = value;
  persist();
  updateMonthlyReportTotalsLive(repId);
  refreshMonthlyYtdLive();
}
function monthlyReportValue(rep, month, metric, baseValue){
  const override = getMonthlyOverride(rep.id, month, metric);
  return override !== undefined ? override : baseValue;
}
function editableMonthCell(rep, month, metric, value, cls=''){
  return `<td class="${cls}">
    <input style="text-align:center;padding:7px;font-size:13px" value="${escapeAttr(value || '')}" 
      oninput="setMonthlyOverride('${rep.id}','${month}','${metric}',this.value)">
  </td>`;
}
function updateMonthlyReportTotalsLive(repId){
  const rep = app.reps.find(r=>r.id===repId);
  if(!rep) return;
  const year = monthlyReportYear || yearKey(weekLabel());
  const baseMonths = monthsForYear(rep, year);
  let held = 0, mrr = 0, set = 0, calls = 0, emails = 0;
  for(let i=1;i<=12;i++){
    const month = year + '-' + String(i).padStart(2,'0');
    const base = baseMonths.find(m=>m.month===month) || {};
    held += num(monthlyReportValue(rep,month,'heldDemos',base.heldDemos || 0));
    mrr += num(monthlyReportValue(rep,month,'mrr',base.mrr || 0));
    set += num(monthlyReportValue(rep,month,'setDemos',base.setDemos || 0));
    calls += num(monthlyReportValue(rep,month,'calls',base.calls || 0));
    emails += num(monthlyReportValue(rep,month,'emails',base.emails || 0));
  }
  const heldEl = document.querySelector('[data-ytd-held]');
  const setEl = document.querySelector('[data-ytd-set]');
  const mrrEl = document.querySelector('[data-ytd-mrr]');
  const activityEl = document.querySelector('[data-ytd-activity]');
  const emailEl = document.querySelector('[data-ytd-emails]');
  if(heldEl) heldEl.textContent = held;
  if(setEl) setEl.textContent = set;
  if(mrrEl) mrrEl.textContent = fmtMoney(mrr);
  if(activityEl) activityEl.textContent = calls.toLocaleString();
  if(emailEl) emailEl.textContent = emails.toLocaleString() + ' emails';
}



function pacingLabel(ytd, annualQuota){
  if(!annualQuota || !ytd) return '';
  const now = new Date();
  const monthsElapsed = now.getMonth() + (now.getDate() / 31);
  const expected = (annualQuota / 12) * monthsElapsed;
  if(ytd >= expected * 0.95) return '<div style="font-size:10px;color:#a7f3d0;margin-top:2px">&#8593; Pacing</div>';
  return '<div style="font-size:10px;color:#fca5a5;margin-top:2px">&#8595; Off Pace</div>';
}


function annualQuotaDisplay(metric,isTeam=false){
  const multiplier = isTeam ? Math.max(1, app.reps.length) : 1;
  const target = num(metric.target);

  if(!target) return 'Annual quota not set';

  let annual = target * 12;

  if(metric.frequency === 'weekly') annual = target * 52;
  if(metric.frequency === 'annual') annual = target;

  annual *= multiplier;

  return `Annual quota ${formatMetric(metric, annual)}`;
}

function monthlyRepData(rep, year){
  const baseMonths = monthsForYear(rep,year);
  return baseMonths.map(m=>({
    ...m,
    setDemos: monthlyReportValue(rep,m.month,'setDemos',m.setDemos || ''),
    heldDemos: monthlyReportValue(rep,m.month,'heldDemos',m.heldDemos || ''),
    mrr: monthlyReportValue(rep,m.month,'mrr',m.mrr || ''),
    calls: monthlyReportValue(rep,m.month,'calls',m.calls || ''),
    emails: monthlyReportValue(rep,m.month,'emails',m.emails || '')
  }));
}

function monthlyTeamData(year){
  return monthNames.map((_,i)=>{
    const month = year + '-' + String(i+1).padStart(2,'0');
    return app.reps.reduce((acc,rep)=>{
      const row = monthlyRepData(rep,year).find(m=>m.month===month) || {};
      acc.setDemos += num(row.setDemos);
      acc.heldDemos += num(row.heldDemos);
      acc.mrr += num(row.mrr);
      acc.calls += num(row.calls);
      acc.emails += num(row.emails);
      return acc;
    },{month,setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0,weeks:1});
  });
}


function currentPaceMonthCount(year){
  const now = new Date();
  const currentYear = now.getFullYear();
  const y = Number(year);
  if(y < currentYear) return 12;
  if(y > currentYear) return 0;
  return now.getMonth() + 1;
}

function ytdTargetForMetric(metric, year, isTeam){
  const monthsElapsed = currentPaceMonthCount(year);
  const multiplier = isTeam ? app.reps.length : 1;
  if(metric === 'heldDemos') return num(app.demoTarget) * monthsElapsed * multiplier;
  if(metric === 'mrr') return num(app.mrrTarget) * monthsElapsed * multiplier;
  if(metric === 'calls') return num(app.weeklyCallTarget) * 4 * monthsElapsed * multiplier;
  if(metric === 'emails') return num(app.weeklyEmailTarget) * 4 * monthsElapsed * multiplier;
  return 0;
}

function formatDelta(metric, actual, target){
  if(!target) return '';
  const diff = num(actual) - num(target);
  const cls = diff > 0 ? 'delta-up' : diff < 0 ? 'delta-down' : 'delta-flat';
  const sign = diff > 0 ? '+' : diff < 0 ? '-' : '';
  const absVal = Math.abs(Math.round(diff));
  const value = metric === 'mrr' ? fmtMoney(absVal) : absVal.toLocaleString();
  const label = diff >= 0 ? 'above pace' : 'below pace';
  return `<div class="${cls}" style="font-size:11px;margin-top:3px">${sign}${value} ${label}</div>`;
}

function monthlyReasoning(metric, actual, target, year, label){
  if(!target) return '';
  const monthsElapsed = currentPaceMonthCount(year);
  const pct = target ? Math.round((num(actual)/target)*100) : 0;
  const actualDisplay = metric === 'mrr' ? fmtMoney(actual) : Math.round(num(actual)).toLocaleString();
  const targetDisplay = metric === 'mrr' ? fmtMoney(target) : Math.round(num(target)).toLocaleString();
  const id = 'why_' + metric + '_' + Math.random().toString(16).slice(2);
  return `<button class="why-toggle" onclick="toggleWhy('${id}')">Why?</button>
    <div id="${id}" class="why-panel">
      <div><b>${label}</b></div>
      <div>Actual YTD: ${actualDisplay}</div>
      <div>Expected pace through ${monthsElapsed} month(s): ${targetDisplay}</div>
      <div>YTD pace: ${pct}%</div>
      <div>${num(actual) >= num(target) ? 'On or ahead of cumulative pace.' : 'Behind cumulative pace.'}</div>
    </div>`;
}

function toggleWhy(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}


function statusReasoning(rep, week){
  const month = monthKey(week.weekOf || weekLabel());
  const stats = typeof monthlyReportStats === 'function'
    ? monthlyReportStats(rep, month)
    : {
        calls:0,
        emails:0,
        setDemos:0,
        heldDemos:0,
        mrr:0
      };

  const opp = opportunityOutlook(rep, week);
  const ph = productHealth(week);
  const status = repStatus(rep);
  const reasons = [];

  const callsGoal = num(app.weeklyCallTarget) * 4;
  const emailsGoal = num(app.weeklyEmailTarget) * 4;
  const heldPct = Math.round((num(stats.heldDemos) / Math.max(1,num(app.demoTarget))) * 100);
  const mrrPct = Math.round((num(stats.mrr) / Math.max(1,num(app.mrrTarget))) * 100);
  const callPct = Math.round((num(stats.calls) / Math.max(1,callsGoal)) * 100);
  const emailPct = Math.round((num(stats.emails) / Math.max(1,emailsGoal)) * 100);

  reasons.push(`Status: ${status.label}`);
  reasons.push(`Held demos MTD: ${num(stats.heldDemos)}/${app.demoTarget} (${heldPct}%)`);
  reasons.push(`MRR MTD: ${fmtMoney(stats.mrr)}/${fmtMoney(app.mrrTarget)} (${mrrPct}%)`);
  reasons.push(`Calls MTD: ${num(stats.calls).toLocaleString()}/${callsGoal.toLocaleString()} (${callPct}%)`);
  reasons.push(`Emails MTD: ${num(stats.emails).toLocaleString()}/${emailsGoal.toLocaleString()} (${emailPct}%)`);
  reasons.push(`Pipeline outlook: ${opp.label} — ${fmtMoney(opp.pipeline)} pipeline vs ${fmtMoney(opp.gap)} remaining MRR gap`);
  reasons.push(`Product mix: ${ph.label} — ${ph.count} products represented, ${Math.round(ph.concentration*100)}% top concentration`);

  if(status.label === 'Performing') reasons.push('Reason: MTD held demos and MRR are both at or above target.');
  else if(status.label === 'On Track') reasons.push('Reason: At least one primary MTD result or pipeline/activity signal is strong enough to support pacing.');
  else reasons.push('Reason: MTD results, activity, and/or pipeline are not strong enough to support current pacing.');

  return reasons;
}

        a.setDemos += num(m.setDemos);
        a.heldDemos += num(m.heldDemos);
        a.mrr += num(m.mrr);
        a.calls += num(m.calls);
        a.emails += num(m.emails);
        return a;
      },{setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0});

      ['heldDemos','mrr','setDemos','calls','emails'].forEach(metric=>{
        const el = document.querySelector(`[data-ytd-rep="${rep.id}"][data-ytd-metric="${metric}"]`);

        el.innerHTML = ytdCellInner(metric, repTotals[metric], target, year, label);
        el.className = target ? (num(repTotals[metric]) >= num(target) ? 'hit' : 'miss') : '';
        el.style.fontWeight = '800';
        el.style.background = 'rgba(96,165,250,.05)';
      });
    });

    const teamMonths = monthlyTeamData(year);
    const totals = teamMonths.reduce((a,m)=>{
      a.setDemos += num(m.setDemos);
      a.heldDemos += num(m.heldDemos);
      a.mrr += num(m.mrr);
      a.calls += num(m.calls);
      a.emails += num(m.emails);
      return a;
    },{setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0});

    updateKpis(totals, true);

    ['heldDemos','mrr','setDemos','calls','emails'].forEach(metric=>{
      const el = document.querySelector(`[data-ytd-team="true"][data-ytd-metric="${metric}"]`);
      if(!el) return;
      const target = ytdTargetForMetric(metric, year, true);
      const label = metric === 'heldDemos' ? 'Held Demos' : metric === 'mrr' ? 'MRR' : metric === 'setDemos' ? 'Set Demos' : metric === 'calls' ? 'Calls' : 'Emails';
      el.innerHTML = ytdCellInner(metric, totals[metric], target, year, label);
      el.className = target ? (num(totals[metric]) >= num(target) ? 'hit' : 'miss') : '';
      el.style.fontWeight = '800';
      el.style.background = 'rgba(96,165,250,.05)';
    });

  }

  const rep = isTeamView ? null : (app.reps[activeRep] || app.reps[0]);
  const monthData = isTeamView ? monthlyTeamData(year) : monthlyRepData(rep, year);
  const totals = monthData.reduce((a,m)=>{
    a.setDemos += num(m.setDemos);
    a.heldDemos += num(m.heldDemos);
    a.mrr += num(m.mrr);
    a.calls += num(m.calls);
    a.emails += num(m.emails);
    return a;
  },{setDemos:0,heldDemos:0,mrr:0,calls:0,emails:0});

  updateKpis(totals, isTeamView);

  ['heldDemos','mrr','setDemos','calls','emails'].forEach(metric=>{
    const el = document.querySelector(`[data-ytd-standard="${metric}"]`);
    if(!el) return;
    const target = ytdTargetForMetric(metric, year, isTeamView);
    const label = metric === 'heldDemos' ? 'Held Demos' : metric === 'mrr' ? 'MRR' : metric === 'setDemos' ? 'Set Demos' : metric === 'calls' ? 'Calls' : 'Emails';
    el.innerHTML = ytdCellInner(metric, totals[metric], target, year, label);

function annualQuotaForMetric(metric, isTeam=false){
  const multiplier = isTeam ? Math.max(1, app.reps.length) : 1;
  const target = num(metric.target);
  if(!target) return 0;

  if(metric.frequency === 'weekly') return target * 52 * multiplier;
  if(metric.frequency === 'monthly') return target * 12 * multiplier;
  if(metric.frequency === 'annual') return target * multiplier;
  return target * 12 * multiplier;
}

function annualQuotaLabel(metric, isTeam=false){
  const quota = annualQuotaForMetric(metric, isTeam);
  if(!quota) return 'Annual quota not set';
  return `Annual quota ${formatMetric(metric, quota)}`;
}


function annualGoalForMetric(metric,isTeam=false){
  const multiplier = isTeam ? Math.max(1, app.reps.length) : 1;
  const target = num(metric.target);
  if(!target) return 0;

  let annual = target * 12;
  if(metric.frequency === 'weekly') annual = target * 52;
  if(metric.frequency === 'annual') annual = target;

  return annual * multiplier;
}

function annualGoalStatusText(metric,total,isTeam=false){
  const annualGoal = annualGoalForMetric(metric,isTeam);
  if(!annualGoal) return 'Annual goal not set';

  const remaining = annualGoal - num(total);
  const formattedGoal = formatMetric(metric, annualGoal);
  const formattedRemaining = formatMetric(metric, Math.abs(remaining));

  if(remaining <= 0){
    return `${formattedGoal} annual goal • ${formattedRemaining} over goal`;
  }

  return `${formattedGoal} annual goal • ${formattedRemaining} to annual goal`;
}

function safeProductMixMonthTotals(reps, year, month, category){
  const totals = {};
  app.products.forEach(p=>totals[p]=0);
  reps.forEach(rep=>{
    (rep.weeks||[])
      .filter(w=>yearKey(w.weekOf)===year && (!month || monthKey(w.weekOf)===month))
      .forEach(w=>{
        app.products.forEach(p=>{
          totals[p] += num((w[category] || {})[p]);
        });
      });
  });
  return totals;
}

function safeProductMixTrendData(reps, year, category){
  const data = {};

    data[p] = monthNames.map((_,i)=>{

          .filter(w=>monthKey(w.weekOf)===key)
          .reduce((inner,w)=>inner+num((w[category]||{})[p]),0);
      },0);
    });
  });
  return data;
}

// Draft state: holds unsaved input values keyed by repIndex_category_product
let _pmDraft = {};

function pmDraftKey(repIndex, category, product){
  return `${repIndex}__${category}__${cssSafeId(product)}`;
}

function flushPmDraftFromDOM(){
  // Read every visible product mix input into _pmDraft before we re-render
  app.reps.forEach((rep, repIndex)=>{
    if(rep.active === false) return;
    app.products.forEach(product=>{

function pmInputValue(repIndex, rep, product, category, weekOf){
  const draftKey = pmDraftKey(repIndex, category, product);

}

function getOrCreateProductMixWeek(rep, weekOf){
  ensureMetrics();
  let week = (rep.weeks || []).find(w=>w.weekOf === weekOf);
  if(!week){
    week = emptyWeek(app.products || defaultProducts);
    week.weekOf = weekOf;
    week.expanded = false;
    week.updateType = 'Product Mix Weekly Update';
    rep.weeks.push(week);
  }

  week.updateType = week.updateType || 'Product Mix Weekly Update';

  ['productSet','productHeld','productClosed','productDemos'].forEach(bucket=>{
    if(!week[bucket]) week[bucket] = {};
    app.products.forEach(p=>{
      if(week[bucket][p] === undefined) week[bucket][p] = '';
    });
  });

  return week;
}

function productMixWeeklyValue(rep, product, category, weekOf){
  const week = (rep.weeks || []).find(w=>w.weekOf === weekOf);
  if(!week || !week[category]) return '';
  return week[category][product] ?? '';
}

function saveProductMixWeeklyBulk(){
  // First flush whatever is currently visible in the DOM into draft
  flushPmDraftFromDOM();

  const weekOf = productMixWeeklyUpdateWeekOf || weekLabel();
  const category = productMixWeeklyUpdateCategory || 'productSet';

  app.reps.forEach((rep, repIndex)=>{
    if(rep.active === false) return;

    const week = getOrCreateProductMixWeek(rep, weekOf);

    app.products.forEach(product=>{
      // Pull from draft first, fall back to DOM element
      const draftVal = _pmDraft[pmDraftKey(repIndex, category, product)];
      const el = document.getElementById(`pmwu_${repIndex}_${category}_${cssSafeId(product)}`);
      const value = draftVal !== undefined ? draftVal : (el ? el.value : '');

      if(!week[category]) week[category] = {};
      week[category][product] = value;

      if(category === 'productSet'){
        if(!week.productDemos) week.productDemos = {};
        week.productDemos[product] = value;
      }
    });
  });

  // Clear draft state after successful save
  _pmDraft = {};
  productMixWeeklyLastSaved = weekOf;
  productMixWeeklyUpdateOpen = false;
  persist();
  render();
}

function productMixRecentWeeks(rep, count=4){
  return [...(rep.weeks || [])]
    .sort((a,b)=>new Date(b.weekOf)-new Date(a.weekOf))
    .slice(0,count);
}

function productTotalForReps(reps, category, count=4){
  const totals = {};
  app.products.forEach(p=>totals[p]=0);

  reps.forEach(rep=>{
    productMixRecentWeeks(rep,count).forEach(w=>{
      app.products.forEach(p=>{
        totals[p] += num((w[category] || {})[p]);
      });
    });
  });

  return totals;
}

function productTotalPreviousWindow(reps, category){
  const totals = {};
  app.products.forEach(p=>totals[p]=0);

  reps.forEach(rep=>{
    const weeks = [...(rep.weeks || [])]
      .sort((a,b)=>new Date(b.weekOf)-new Date(a.weekOf))
      .slice(4,8);

    weeks.forEach(w=>{
      app.products.forEach(p=>{
        totals[p] += num((w[category] || {})[p]);
      });
    });
  });

  return totals;
}

function productMomentumLabel(current, previous){
  if(previous === 0 && current > 0) return 'Rising';
  if(current > previous * 1.15) return 'Rising';
  if(current < previous * .85) return 'Declining';
  return 'Stable';
}

function buildProductMixIntelligence(){
  const reps = app.reps.filter(r=>r.active!==false);
  const category = productMixCategory || 'productSet';
  const totals = productTotalForReps(reps, category, 4);
  const previous = productTotalPreviousWindow(reps, category);
  const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,x)=>s+x[1],0);
  const top = entries[0] || ['No product',0];
  const lowest = [...entries].sort((a,b)=>a[1]-b[1])[0] || ['No product',0];
  const concentration = total ? Math.round((top[1]/total)*100) : 0;

  const rising = app.products
    .map(p=>({product:p,current:totals[p]||0,previous:previous[p]||0,label:productMomentumLabel(totals[p]||0,previous[p]||0)}))
    .filter(x=>x.label==='Rising')
    .sort((a,b)=>(b.current-b.previous)-(a.current-a.previous));

  const declining = app.products
    .map(p=>({product:p,current:totals[p]||0,previous:previous[p]||0,label:productMomentumLabel(totals[p]||0,previous[p]||0)}))
    .filter(x=>x.label==='Declining')
    .sort((a,b)=>(a.current-a.previous)-(b.current-b.previous));

  const gaps = entries.filter(x=>x[1]===0).map(x=>x[0]);

  let coaching = 'Product mix looks balanced enough to monitor.';
  if(concentration >= 65) coaching = `Team activity is concentrated in ${top[0]}. Consider broader product positioning.`;
  else if(gaps.length) coaching = `${gaps[0]} has no recent activity. Consider enablement or campaign focus.`;
  else if(declining.length) coaching = `${declining[0].product} is declining. Review messaging and rep confidence.`;
  else if(rising.length) coaching = `${rising[0].product} is gaining momentum. Capture what is working.`;

  return {reps,category,totals,previous,entries,total,top,lowest,concentration,rising,declining,gaps,coaching};
}

function heatClass(value, max){
  if(!value) return 'product-heat-0';
  const pct = max ? value / max : 0;
  if(pct >= .80) return 'product-heat-4';
  if(pct >= .55) return 'product-heat-3';
  if(pct >= .25) return 'product-heat-2';
  return 'product-heat-1';
}

function productMonthlyOverrideKey(productIndex, month, category){
  return `${productIndex}_${month}_${category}`;
}

function getProductMonthlyOverrideByIndex(productIndex, month, category){
  if(!app.productMonthlyOverrides) app.productMonthlyOverrides = {};
  return app.productMonthlyOverrides[productMonthlyOverrideKey(productIndex,month,category)];
}

function setProductMonthlyOverrideByIndex(productIndex, month, category, value, shouldRender=false){
  if(!app.productMonthlyOverrides) app.productMonthlyOverrides = {};
  const key = productMonthlyOverrideKey(productIndex,month,category);

  if(value === '' || value === null || value === undefined){
    delete app.productMonthlyOverrides[key];
  } else {
    app.productMonthlyOverrides[key] = value;
  }

  persist();

  if(shouldRender){
    render();
  }
}

function editableProductMonthValueByIndex(productIndex, month, category){
  const override = getProductMonthlyOverrideByIndex(productIndex, month, category);
  if(override !== undefined) return override;
  const product = app.products[productIndex];
  return productMonthValueForProduct(product, month, category);
}

function productMonthValueResolvedByIndex(productIndex, month, category){
  const override = getProductMonthlyOverrideByIndex(productIndex, month, category);
  if(override !== undefined) return num(override);
  const product = app.products[productIndex];
  return productMonthValueForProduct(product, month, category);
}

function productMonthValueForProduct(product, month, category){
  const reps = app.reps.filter(r=>r.active!==false);
  return reps.reduce((sum,rep)=>{
    return sum + (rep.weeks || [])
      .filter(w=>monthKey(w.weekOf)===month)
      .reduce((weekSum,w)=>weekSum+num((w[category]||{})[product]),0);
  },0);
}

function productMonthClass(value, max){
  if(!value) return 'zero';
  const pct = max ? value / max : 0;
  if(pct >= .80) return 'exceptional';
  if(pct >= .55) return 'high';
  if(pct >= .25) return 'medium';
  return 'low';
}

function productMonthTrend(values){
  const recent = values.slice(-3).reduce((s,v)=>s+v,0);
  const prior = values.slice(-6,-3).reduce((s,v)=>s+v,0);
  if(prior === 0 && recent > 0) return {label:'New momentum', cls:'green'};
  if(recent > prior * 1.15) return {label:'Trending up', cls:'green'};
  if(recent < prior * .85) return {label:'Trending down', cls:'red'};
  return {label:'Stable', cls:'blue'};
}

function exportBackup(){
  try{
    const payload = {
      exportedAt:new Date().toISOString(),
      version:'PipelinePulseBackup_v1',
      data:app
    };

    const blob = new Blob(
      [JSON.stringify(payload,null,2)],
      {type:'application/json'}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `pipeline-pulse-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

    setBackupStatus('Backup exported successfully.');
  }catch(err){
    console.error(err);
    setBackupStatus('Backup export failed.');
  }
}

function triggerImportBackup(){
  const input = document.getElementById('backupImportInput');
  if(input) input.click();
}

function importBackupFile(event){
  const file = event.target.files?.[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);

      if(!parsed.data){
        throw new Error('Invalid backup format.');
      }

      if(!confirm('Importing this backup will overwrite current app data. Continue?')){
        return;
      }

      app = parsed.data;

      persist();
      render();

      setBackupStatus('Backup restored successfully.');
    }catch(err){
      console.error(err);
      alert('Backup restore failed.');
      setBackupStatus('Backup restore failed.');
    }
  };

  reader.readAsText(file);
}

function resetEntireApp(){

function adviceMetricValue(rep, metric){
  const stats = typeof monthlyReportStats === 'function' ? monthlyReportStats(rep) : (typeof repScorecardMonthlyStats === 'function' ? repScorecardMonthlyStats(rep) : {});
  const calls = num(stats.calls);
  const emails = num(stats.emails);
  const setDemos = num(stats.setDemos);
  const held = num(stats.heldDemos || stats.demosHeld);
  const mrr = num(stats.mrr);
  if(metric === 'callsPerDemo') return setDemos ? calls / setDemos : 999;
  if(metric === 'showRate') return setDemos ? (held / setDemos) * 100 : 0;
  if(metric === 'mrrPerDemo') return setDemos ? mrr / setDemos : 0;
  if(metric === 'activityPace'){
    const goal = (num(app.weeklyCallTarget) * 4) + (num(app.weeklyEmailTarget) * 4);
    return goal ? ((calls + emails) / goal) * 100 : 100;
  }
  if(metric === 'productConcentration'){
    const totals = {};
    app.products.forEach(p=>totals[p]=0);
    (rep.weeks || []).filter(w=>monthKey(w.weekOf)===monthKey(weekLabel())).forEach(w=>{
      app.products.forEach(p=>{ totals[p] += num((w.productSet || {})[p]) + num((w.productHeld || {})[p]) + num((w.productClosed || {})[p]); });
    });
    const values = Object.values(totals);
    const total = values.reduce((a,b)=>a+b,0);
    const max = Math.max(0,...values);
    return total ? (max / total) * 100 : 0;
  }
  return 0;
}
function ruleTriggered(value, operator, threshold){
  const v = num(value), t = num(threshold);
  if(operator === 'lt') return v < t;
  if(operator === 'lte') return v <= t;
  if(operator === 'gt') return v > t;
  if(operator === 'gte') return v >= t;
  if(operator === 'eq') return v === t;
  return false;
}
function adviceForRep(rep){
  ensureAdviceRules();
  const triggered = app.adviceRules
    .filter(rule=>rule.active !== false)
    .map(rule=>({...rule, value: adviceMetricValue(rep, rule.metric)}))
    .filter(rule=>String(rule.threshold ?? '').trim() !== '' && ruleTriggered(rule.value, rule.operator, rule.threshold))
    .sort((a,b)=>num(a.priority)-num(b.priority));
  if(triggered.length){
    const top = triggered[0];
    return {label:top.label, advice:top.advice, rule:top, all:triggered};
  }
  return {label:'Maintain Consistency', advice:'No major advice rule triggered from current-month data. Reinforce what is working and monitor pacing.', rule:null, all:[]};
}
